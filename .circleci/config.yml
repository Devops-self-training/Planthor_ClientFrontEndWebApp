version: 2.1
orbs:
  node: circleci/node@4.3.0
jobs:
  build:
    executor:
      name: node/default
      tag: "13.14"
    steps:
      - checkout
      - node/install-packages
      - run:
          name: test & build
          command: npm run test && npm run build
      - run:
          name: check folder
          command: ls
      - run: mkdir -p workspace
      - run: cp ./public/* ./workspace && cd workspace && ls

  deploy:
    # machine:
    #   image: ubuntu-1604:202007-01
    #   docker_layer_caching: true
    executor:
      name: node/default
      tag: "13.14"
    steps:
      - attach_workspace:
          # Must be absolute path or relative path from working_directory
          at: /tmp/public

      - run:
          name: testing
          command: ls

workflows:
  test_my_app:
    jobs:
      - build
      - deploy:
          requires:
            - build
